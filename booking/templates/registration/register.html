{% load static %}

<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #7b5cff, #a18cd1);
}

/* Card */
.form-box {
    width: 360px;
    background: white;
    padding: 35px 30px;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
}

h2 {
    text-align: center;
    margin-bottom: 5px;
    color: #333;
}

.subtitle {
    text-align: center;
    margin-bottom: 25px;
    color: #777;
    font-size: 14px;
}

/* Input */
.input-group {
    position: relative;
    margin-bottom: 18px;
}

.input-group input {
    width: 100%;
    padding: 12px 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
    outline: none;
    transition: 0.2s;
}

.input-group input:focus {
    border-color: #7b5cff;
    box-shadow: 0 0 5px rgba(123, 92, 255, 0.3);
}

.input-group label {
    position: absolute;
    top: 12px;
    left: 10px;
    color: #888;
    transition: 0.3s;
    background: white;
    padding: 0 5px;
}

.input-group input:focus + label,
.input-group input:not(:placeholder-shown) + label {
    top: -8px;
    font-size: 12px;
    color: #7b5cff;
}

/* Button */
button {
    width: 100%;
    padding: 12px;
    background: #7b5cff;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 15px;
    transition: 0.3s;
}

button:hover {
    background: #5a3ee0;
}

/* Link */
.link {
    margin-top: 15px;
    text-align: center;
    font-size: 14px;
}

.link a {
    color: #7b5cff;
    text-decoration: none;
}

.link a:hover {
    text-decoration: underline;
}

/* 🔥 GLOBAL TOAST */
#global-toast {
    position: fixed;
    top: 0px;
    left: 50%;
    transform: translateX(-50%);
    
    min-width: 260px;
    text-align: center;

    padding: 14px 18px;
    border-radius: 10px;

    color: white;
    font-size: 14px;

    display: none;
    opacity: 0;

    z-index: 9999;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);

    transition: all 0.4s ease;
}
</style>

</head>

<body>

<div class="form-box">

    <h2>Create Account ✨</h2>
    <p class="subtitle">Register to continue</p>

    <form method="post">
        {% csrf_token %}

        <div class="input-group">
            <input type="text" name="username" required placeholder=" ">
            <label>Username</label>
        </div>

        <div class="input-group">
            <input type="password" name="password1" required placeholder=" ">
            <label>Password</label>
        </div>

        <div class="input-group">
            <input type="password" name="password2" required placeholder=" ">
            <label>Confirm Password</label>
        </div>

        <button type="submit">Register</button>
    </form>

    <div class="link">
        Already have an account?
        <a href="{% url 'login' %}">Login</a>
    </div>

</div>

<!-- 🌍 GLOBAL TOAST -->
<div id="global-toast"></div>

<script>
function showToast(message, type="error") {
    let toast = document.getElementById("global-toast");

    toast.innerHTML = message;

    if (type === "success") {
        toast.style.background = "#28a745";
    } else if (type === "warning") {
        toast.style.background = "#ffc107";
        toast.style.color = "#000";
    } else {
        toast.style.background = "#ff4d4d";
    }

    toast.style.display = "block";

    setTimeout(() => {
        toast.style.opacity = "1";
        toast.style.top = "20px";
    }, 50);

    setTimeout(() => {
        toast.style.opacity = "0";
        toast.style.top = "0px";
    }, 3500);

    setTimeout(() => {
        toast.style.display = "none";
    }, 4000);
}
</script>

{% if messages %}
<script>
document.addEventListener("DOMContentLoaded", function () {
    {% for message in messages %}
        showToast("{{ message|escapejs }}", "{{ message.tags }}");
    {% endfor %}
});
</script>
{% endif %}

</body>
</html>
