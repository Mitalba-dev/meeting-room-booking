{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            display: flex;
            height: 100vh;
        }

        .left {
            width: 50%;
            background: url("{% static 'images/meeting.jpg' %}") no-repeat center;
            background-size: cover;
        }

        .right {
            width: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f5e9e2;
        }

        .box {
            width: 300px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #6d4c5b;
            color: white;
            border: none;
            border-radius: 6px;
        }
    </style>
</head>

<body>

<div class="left"></div>

<div class="right">
    <div class="box">
        <h2>Create Account</h2>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Register</button>
        </form>

        <a href="{% url 'login' %}">Already have account? Login</a>
    </div>
</div>

</body>
</html>
