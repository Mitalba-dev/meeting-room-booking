<!DOCTYPE html>
<html>
<head>
    <title>Meeting Room</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #7b5cff, #a18cd1);
        }

        .layout {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 230px;
            background: #1d1d6345;
            color: black;
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .sidebar h2 {
            margin-bottom: 25px;
            text-align: center;
            font-size: 20px;
        }

        .menu a {
            display: flex;
            align-items: center;
            gap: 10px;
            color: black;
            padding: 10px 12px;
            margin-bottom: 8px;
            text-decoration: none;
            border-radius: 8px;
            transition: 0.3s;
        }

        .menu a:hover {
            background: #2d2d44;
            color: white;
        }

        .menu a.active {
            background: #7b5cff;
            color: white;
        }

        /* User section */
        .user-section {
            border-top: 1px solid #444;
            padding-top: 15px;
            text-align: center;
        }

        .user-name {
            font-size: 14px;
            margin-bottom: 8px;
            color: #aaa;
        }

        .logout-btn {
            display: block;
            padding: 8px;
            background: #ff5c5c;
            color: white;
            border-radius: 6px;
            text-decoration: none;
            font-size: 13px;
        }

        .logout-btn:hover {
            background: #e04848;
        }

        /* Main content */
        .main {
            flex: 1;
            padding: 30px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }

        .footer {
            text-align: center;
            padding: 10px;
            color: white;
            margin-top: 20px;
        }

        /* Mobile */
        @media (max-width: 768px) {
            .layout {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                flex-direction: row;
                justify-content: space-around;
                align-items: center;
            }

            .menu {
                display: flex;
                gap: 10px;
            }

            .menu a {
                font-size: 12px;
                padding: 8px;
            }

            .user-section {
                display: none;
            }
        }
    </style>
</head>

<body>

<div class="layout">

    <!-- Sidebar -->
    <div class="sidebar">

        <div>
            <h2>🏢 Meeting</h2>

            <div class="menu">
                <a href="{% url 'dashboard' %}" class="{% if request.path == '/' %}active{% endif %}">
                    📊 Dashboard
                </a>

                <a href="{% url 'room_list' %}" class="{% if 'room' in request.path %}active{% endif %}">
                    🏠 Rooms
                </a>

                <a href="{% url 'booking_list' %}" class="{% if 'booking' in request.path %}active{% endif %}">
                    📅 Bookings
                </a>

                <a href="{% url 'create_booking' %}">
                    ➕ Create
                </a>
            </div>
        </div>

        {% if user.is_authenticated %}
        <div class="user-section">
            <div class="user-name">👤 {{ user.username }}</div>
            <a href="{% url 'logout' %}" class="logout-btn">Logout</a>
        </div>
        {% endif %}

    </div>

    <!-- Main -->
    <div class="main">

        <div class="card">
            {% block content %}
            {% endblock %}
        </div>

        <div class="footer">
            © 2025 Meeting Room Booking
        </div>

    </div>

</div>

</body>
</html>
