{% extends 'base.html' %}

{% block content %}

<style>
.booking-container {
    max-width: 500px;
    margin: 40px auto;
    background: #ffffff;
    padding: 25px 30px;
    border-radius: 12px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.08);
}

.booking-container h2 {
    text-align: center;
    margin-bottom: 20px;
    color: #333;
}

.input-group {
    margin-bottom: 15px;
}

label {
    display: block;
    margin-bottom: 5px;
    font-weight: 500;
}

input, select, textarea {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

input:focus, select:focus, textarea:focus {
    border-color: #7b5cff;
    box-shadow: 0 0 5px rgba(123, 92, 255, 0.3);
}

.book-btn {
    width: 100%;
    padding: 12px;
    background: #ff9800;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

.back-link {
    display: block;
    text-align: center;
    margin-top: 15px;
    text-decoration: none;
    color: #7b5cff;
}
</style>

<div class="booking-container">
    <h2>Update Booking</h2>

    <form method="POST">
        {% csrf_token %}

        <!-- 🔥 MANUAL FIELDS (NO ERROR RENDERING) -->
        {% for field in form %}
            <div class="input-group">
                <label>{{ field.label }}</label>
                {{ field }}
            </div>
        {% endfor %}

        <button type="submit" class="book-btn">
            Update Booking
        </button>
    </form>

    <a href="{% url 'booking_list' %}" class="back-link">
        ← Back to Bookings
    </a>
</div>

{% endblock %}
