<h2> Bookings <h2>

<ul>
    {% for booking in bookings  %}
        <li>
            <b>{{booking.title}}</b> |
            {{booking.room.name}} |
            {{booking.start_time}} - {{booking.end_time}}

            <a href="{% url 'delete_booking' booking.id %}">Delete</a>

        </li>
    {% endfor %}
</ul>

<a href="{% url 'create_booking' %}"> New Booking</a><br>
<a href="{% url 'room_list' %}">Home</a><br>
