{% extends 'base.html' %}

{% block content %}

<style>
/* Header */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}

/* Add button */
.add-btn {
    background: #7b5cff;
    color: white;
    padding: 10px 15px;
    border-radius: 8px;
    text-decoration: none;
    font-size: 14px;
    transition: 0.3s;
}

.add-btn:hover {
    background: #5a3ee0;
}

/* Grid Layout */
.room-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
}

/* Card */
.room-card {
    background: #ffffff;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.08);
    transition: 0.3s;
    position: relative;
}

/* Hover effect */
.room-card:hover {
    transform: translateY(-6px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

/* Title */
.room-title {
    font-size: 18px;
    font-weight: 600;
    color: #333;
}

/* Capacity */
.room-capacity {
    font-size: 14px;
    color: #777;
    margin-top: 5px;
}

/* Actions */
.actions {
    margin-top: 15px;
    display: flex;
    gap: 10px;
}

/* Buttons */
.btn {
    padding: 6px 12px;
    border-radius: 6px;
    text-decoration: none;
    font-size: 13px;
    color: white;
    transition: 0.3s;
}

.edit-btn {
    background: #4caf50;
}

.edit-btn:hover {
    background: #3d8b40;
}

.delete-btn {
    background: #ff5c5c;
}

.delete-btn:hover {
    background: #e04848;
}

/* Empty */
.empty {
    text-align: center;
    color: #666;
}
</style>

<div class="header">
    <h2>🏢 Manage Rooms</h2>

    <a href="{% url 'room_create' %}" class="add-btn">
        + Add Room
    </a>
</div>

<div class="room-container">

    {% for room in rooms %}
        <div class="room-card">

            <div class="room-title">
                {{ room.name }}
            </div>

            <div class="room-capacity">
                Capacity: {{ room.capacity }}
            </div>

            <div class="actions">
                <a href="{% url 'room_update' room.id %}" class="btn edit-btn">
                    ✏️ Edit
                </a>

                <a href="{% url 'room_delete' room.id %}" class="btn delete-btn">
                    ❌ Delete
                </a>
            </div>

        </div>
    {% empty %}
        <p class="empty">No rooms found</p>
    {% endfor %}

</div>

{% endblock %}
